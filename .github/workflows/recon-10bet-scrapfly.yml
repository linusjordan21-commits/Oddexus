name: Recon 10bet via Scrapfly (engångs)

# 10bet sportswidget via Scrapfly ASP (render passerar CF + fångar nätverk). Listar
# getslice-URL:er, dumpar en .bin:s magic-bytes (format-ID) + browser_data.xhr_call +
# widget-script. ENDAST dispatch. Secret: SCRAPER_API_KEY. Output: data/_recon-10bet-scrapfly.json.

on:
  workflow_dispatch: {}

concurrency:
  group: recon-10bet-scrapfly
  cancel-in-progress: true

jobs:
  recon:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run 10bet Scrapfly recon
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: node scripts/recon-10bet-scrapfly.mjs
      - name: Dump report
        if: always()
        run: cat data/_recon-10bet-scrapfly.json 2>/dev/null || echo "(ingen rapport)"
      - name: Commit report
        if: always()
        run: |
          BR="${GITHUB_REF_NAME}"
          git add data/_recon-10bet-scrapfly.json 2>/dev/null || true
          if git diff --staged --quiet; then echo "ingen förändring"; exit 0; fi
          git commit -m "chore(recon): 10bet scrapfly ($(date -u +%FT%TZ))" || exit 0
          for attempt in 1 2 3; do
            timeout 30 git fetch origin "$BR" >/dev/null 2>&1 || true
            timeout 30 git rebase --autostash "origin/$BR" >/dev/null 2>&1 || git rebase --abort >/dev/null 2>&1 || true
            if timeout 60 git push origin "HEAD:$BR" >/dev/null 2>&1; then echo "push OK ($attempt)"; break; fi
            sleep $((attempt * 3))
          done
