name: Recon Coolbet via scraping-API (engångs)

# Coolbet-rekon via valfri scraping-API-leverantör (ScraperAPI/ScrapingBee/
# Scrapfly/ZenRows) — alla löser Imperva ABP + residential-proxy. Renderar
# odds-sidan och fångar API/odds-form → vi bygger scrapern mot den. ENDAST
# dispatch. Secrets: SCRAPER_PROVIDER + SCRAPER_API_KEY.

on:
  workflow_dispatch: {}

concurrency:
  group: recon-coolbet-scraperapi
  cancel-in-progress: true

jobs:
  recon:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run scraping-API recon
        env:
          SCRAPER_PROVIDER: ${{ secrets.SCRAPER_PROVIDER }}
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: node scripts/recon-coolbet-scraperapi.mjs

      - name: Commit recon output
        if: always()
        run: |
          set -e
          git add data/_coolbet-scraperapi-recon.json data/_coolbet-bundle-*.js || true
          if git diff --staged --quiet; then echo "No change"; exit 0; fi
          git commit -m "chore(recon): coolbet scraping-api-rekon ($(date -u +%FT%TZ))"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            git rebase --autostash "origin/$GITHUB_REF_NAME" || { git rebase --abort || true; }
            if git push origin "HEAD:$GITHUB_REF_NAME"; then echo "Push OK ($attempt)"; break; fi
            sleep $((attempt * 5))
          done
