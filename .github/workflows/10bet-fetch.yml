name: 10bet Odds Fetch

# 10bet.se (Playtech Vision) prematch-fotboll-1X2 via Scrapfly: render passerar CF +
# monterar widgeten (odds i DOM med ta-*-klasser) → DOM-skrap av .ta-EventListItem →
# 10bet-rows.json. Odds-feeden är binär getslice/.bin (custom) → DOM är enda vägen.
# KOSTNAD: ingen JSON-API (binär feed) → DOM-walk per tävling. ~4 renders/körn
# (4 tävlingar/render, tak 16) = ~120 credits/körn. cron */15 (2 880 körn/mån ×120
# ≈ 346k credits) delar 1M-budget m. coolbet/tipwin. 24h-fokus (>24h filtreras bort).
# Secret: SCRAPER_API_KEY.

on:
  # schedule avaktiverad — 10bet pollas nu i scrape-loop-paid.yml (viktad loop, var 3:e cykel)
  workflow_dispatch: {}

concurrency:
  group: 10bet-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 9
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Fetch 10bet (Scrapfly)
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: node scripts/fetch-10bet-github-action.mjs || echo "::warning::fetch exit!=0 — cache bevarad"
      - name: Dump diag
        if: always()
        run: |
          echo "===== _10bet-scraper-diag.json ====="
          cat data/_10bet-scraper-diag.json 2>/dev/null || echo "(ingen diag)"
          echo "===== 10bet-rows.json (sammanfattning) ====="
          node -e "const d=require('./data/10bet-rows.json');console.log('events:',d.events?.length??0);console.log('sample:',JSON.stringify((d.events||[])[0]||null))" 2>/dev/null || echo "(ingen rows-fil)"
      - name: Commit + push (main)
        if: always()
        run: |
          git add data/10bet-rows.json data/_10bet-scraper-diag.json 2>/dev/null || true
          if git diff --staged --quiet; then echo "ingen förändring"; exit 0; fi
          git commit -m "chore(10bet): odds via Playtech-DOM ($(date -u +%FT%TZ))" || exit 0
          for attempt in 1 2 3 4 5; do
            timeout 60 git fetch origin main >/dev/null 2>&1 || true
            timeout 60 git rebase --autostash origin/main >/dev/null 2>&1 || git rebase --abort >/dev/null 2>&1 || true
            if timeout 120 git push origin HEAD:main >/dev/null 2>&1; then echo "push OK ($attempt)"; break; fi
            sleep $((attempt * 5))
          done
