name: Recon Coolbet (browser, engångs)

# Engångs browser-rekon av Coolbet (Imperva/Incapsula-skyddad). Stealth-Chromium
# laddar odds-sidan och fångar de faktiska odds-API-anropen → vi bygger scrapern
# mot VERKLIG data. Coolbet är geo-känslig (svensk licens) → Mullvad WireGuard
# (svensk relay), samma mönster som betsson-fetch. ENDAST workflow_dispatch.

on:
  workflow_dispatch: {}

concurrency:
  group: recon-coolbet
  cancel-in-progress: true

jobs:
  recon:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --include=dev

      - name: Install Playwright Chromium + real Google Chrome
        run: |
          npx playwright install chromium --with-deps
          npx playwright install chrome || echo "chrome-channel install misslyckades — faller tillbaka på chromium"

      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install WireGuard
        run: |
          set -e
          sudo apt-get update -qq
          sudo apt-get install -y -qq wireguard resolvconf iproute2 xvfb

      - name: Start Mullvad WireGuard tunnel (hoppas om residential-proxy används)
        env:
          WG_CONF: ${{ secrets.MULLVAD_WG_CONF }}
          COOLBET_PROXY_URL: ${{ secrets.COOLBET_PROXY_URL }}
        run: |
          set +x
          if [ -n "$COOLBET_PROXY_URL" ]; then
            echo "COOLBET_PROXY_URL satt → residential-proxy ger IP:n, hoppar över VPN"
            exit 0
          fi
          if [ -z "$WG_CONF" ]; then
            echo "::warning::Varken COOLBET_PROXY_URL eller MULLVAD_WG_CONF satt — kör direkt (datacenter-IP, troligen Imperva-block)"
            exit 0
          fi
          printf '%s' "$WG_CONF" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          echo "WireGuard tunnel up"

      - name: Run Coolbet browser recon (headful via xvfb, routar ev. via residential-proxy)
        env:
          COOLBET_PROXY_URL: ${{ secrets.COOLBET_PROXY_URL }}
        run: xvfb-run -a --server-args="-screen 0 1440x900x24" node scripts/recon-coolbet.mjs

      - name: Stop WireGuard tunnel
        if: always()
        run: |
          set +x
          sudo wg-quick down wg0 2>/dev/null || true
          sudo rm -f /etc/wireguard/wg0.conf

      - name: Commit recon output
        if: always()
        run: |
          set -e
          git add data/_coolbet-recon.json || true
          if git diff --staged --quiet; then
            echo "No recon output change"
            exit 0
          fi
          git commit -m "chore(recon): coolbet browser-rekon ($(date -u +%FT%TZ))"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            git rebase --autostash "origin/$GITHUB_REF_NAME" || { git rebase --abort || true; }
            if git push origin "HEAD:$GITHUB_REF_NAME"; then echo "Push OK ($attempt)"; break; fi
            sleep $((attempt * 5))
          done
