name: Scrapfly saldo (engångs)

# Hämtar exakt kvarvarande Scrapfly-credits via konto-API (0 scrape-credits).
# Resultat → data/_scrapfly-account.json. ENDAST dispatch. Secret: SCRAPER_API_KEY.

on:
  workflow_dispatch: {}

concurrency:
  group: scrapfly-balance
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup git
        run: git config user.name "github-actions[bot]" && git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Check balance
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: node scripts/check-scrapfly-balance.mjs
      - name: Dump (utan raw)
        if: always()
        run: node -e "const d=require('./data/_scrapfly-account.json'); const {raw, ...rest}=d; console.log(JSON.stringify(rest,null,2));" 2>/dev/null || cat data/_scrapfly-account.json
      - name: Commit
        if: always()
        run: |
          git add data/_scrapfly-account.json || true
          if git diff --staged --quiet; then echo "No change"; exit 0; fi
          git commit -m "chore(recon): scrapfly saldo ($(date -u +%FT%TZ))"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            git rebase --autostash "origin/$GITHUB_REF_NAME" || { git rebase --abort || true; }
            if git push origin "HEAD:$GITHUB_REF_NAME"; then echo "Push OK ($attempt)"; break; fi
            sleep $((attempt * 5))
          done
