name: Shadow CLV (periodic one-shot)

# ORCHESTRERAD PERIODIC (2026-06-29): tidigare en kontinuerlig 45-min self-loop som
# ÅT EN GitHub-slot konstant. På det nya kontots ~12-slot-tak gav det noll headroom
# → fleeten blev skör. NU: ETT pass (capture → settle → shadow), sedan exit. Keepalive
# (flottans orchestrator) dispatchar detta var ~10:e min via workflow_dispatch — så
# sloten är fri ~20-65% av tiden (beror på körtid: settle-clv skannar ~217k decisions
# → passet är ~3-8 min). Closing-capture missas inte: 15-min-fönstret täcks av
# 10-min-cadensen med ≥2 min marginal. schedule (7,27,47) kvar som BACKUP om keepalive dör.
#
# PÅVERKAR INGA live-beslut: läser committade *-rows.json, skriver bara CLV-
# state via actions/cache (ingen repo-churn). Inga secrets utöver SUPABASE_*
# (tracking-CLV) + GITHUB_TOKEN. Inget auto-bet. Max runtime 10 min (timeout).

on:
  schedule:
    - cron: "7,27,47 * * * *" # backup re-seed (ojämn minut = mindre throttle)
  workflow_dispatch: {}

concurrency:
  group: shadow-clv
  # false → en köad efterföljare tar sömlöst över när nuvarande pass slutar.
  cancel-in-progress: false

jobs:
  shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # MAX runtime — ett periodic pass (capture+settle), inte en loop
    permissions:
      contents: read # ingen self-redispatch längre (keepalive dispatchar periodic)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --include=dev

      - name: Restore CLV state
        uses: actions/cache/restore@v4
        with:
          path: |
            data/clv-log.jsonl
            data/pinnacle-closing.json
          key: shadow-clv-state-${{ github.run_id }}
          restore-keys: |
            shadow-clv-state-

      - name: Capture closing + settle CLV (ETT periodic pass)
        env:
          # Tracking-CLV: läser closing på disk + skriver CLV till spårade signaler.
          # Påverkar ingen prissättning. No-op om secrets saknas.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          # Medvetet INTE 'set -e' — ett enskilt steg får aldrig fälla passet.
          echo "=== shadow-clv ONE-SHOT START $(date -u +%FT%TZ) | commit ${GITHUB_SHA:0:8} ==="
          # 1) CLOSING CAPTURE (tidskänslig: fångar Pinnacle-closing för matcher inom
          #    15-min-fönstret före avspark). Körs FÖRST varje pass så fönstret aldrig
          #    missas (keepalive dispatchar passet var ~10:e min → ≥5 min marginal).
          echo "--- [1/4] closing capture (15-min-fönster) ---"
          npx vite-node scripts/capture-pinnacle-closing.ts 15 2 || echo "[ci] capture-fel ignorerat"
          [ -f data/pinnacle-closing.json ] && echo "closing-state: $(wc -c < data/pinnacle-closing.json) bytes"
          # 2) SETTLEMENT (mindre tidskänslig, batchas naturligt per pass).
          echo "--- [2/4] settle-clv (decisions) ---"
          npx vite-node scripts/settle-clv.ts || echo "[ci] settle-fel ignorerat"
          echo "--- [3/4] settle-tracking-clv (spårade signaler) ---"
          npx vite-node scripts/settle-tracking-clv.mjs || echo "[ci] tracking-clv-fel ignorerat"
          echo "--- [4/4] shadow-consensus ---"
          npx vite-node scripts/shadow-consensus.ts all || echo "[ci] shadow-fel ignorerat"
          [ -f data/clv-log.jsonl ] && echo "clv-log rader: $(wc -l < data/clv-log.jsonl)"
          echo "=== shadow-clv ONE-SHOT SLUT $(date -u +%FT%TZ) ==="

      - name: Save CLV state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/clv-log.jsonl
            data/pinnacle-closing.json
          key: shadow-clv-state-${{ github.run_id }}
