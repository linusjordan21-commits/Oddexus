name: Recon Coolbet via Scrapfly (engångs)

# Coolbet odds-rekon via Scrapfly: renderar odds-sidan (asp löser Imperva, SPA
# hydrerar) och fångar sidans XHR → sbgate odds-JSON. ENDAST dispatch.
# Secret: SCRAPER_API_KEY (Scrapfly-nyckel). Dump → data/_coolbet-scrapfly-recon.json.

on:
  workflow_dispatch: {}

concurrency:
  group: recon-coolbet-scrapfly
  cancel-in-progress: true

jobs:
  recon:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run Scrapfly recon
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        run: node scripts/recon-coolbet-scrapfly.mjs
      - name: Commit recon output
        if: always()
        run: |
          set -e
          for f in _coolbet-scrapfly-recon.json _coolbet-scrapfly-page.html _coolbet-sbgate-data.json _coolbet-sbgate-xhr.json _coolbet-tree-recon.json; do
            git add "data/$f" 2>/dev/null || true
          done
          if git diff --staged --quiet; then echo "No change"; exit 0; fi
          git commit -m "chore(recon): coolbet scrapfly-rekon ($(date -u +%FT%TZ))"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$GITHUB_REF_NAME"
            git rebase --autostash "origin/$GITHUB_REF_NAME" || { git rebase --abort || true; }
            if git push origin "HEAD:$GITHUB_REF_NAME"; then echo "Push OK ($attempt)"; break; fi
            sleep $((attempt * 5))
          done
